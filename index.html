<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahabat Awa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
  .chat-scroll::-webkit-scrollbar { width: 0px; } /* ilangin scrollbar biar clean */
  .typing-dot { animation: bounce 1.4s infinite both; }
  .typing-dot:nth-child(2) { animation-delay:.2s; }
  .typing-dot:nth-child(3) { animation-delay:.4s; }
   @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body class="bg-gradient-to-br from-violet-600 via-indigo-500 to-blue-500 min-h-screen flex items-center justify-center p-4 font-sans">

  <div class="w-full max-w-lg bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl flex-col h-[85vh] border-white/20">
    <!-- Header -->
    <div class="p-4 border-b border-white/20 flex items-center gap-3">
      <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-white font-bold text-xl">✨</div>
      <div>
        <h1 class="font-bold text-xl text-white">Sahabat Awa</h1>
        <p class="text-xs text-green-300 flex items-center gap-1"><span class="w-2 h-2 bg-green-300 rounded-full"></span> Online</p>
      </div>
    </div>

    <!-- Chat Area -->
    <div id="chat" class="flex-1 p-5 overflow-y-auto chat-scroll space-y-4"></div>

    <!-- Input Area -->
    <div class="p-4 border-t border-white/20">
      <div class="flex gap-2 items-center bg-white/20 rounded-2xl p-2">
        <input id="msg" type="text" placeholder="Curhat apa hari ini..."
               class="flex-1 bg-transparent text-white placeholder-white/70 focus:outline-none px-3">
        <button onclick="send()" class="bg-white text-indigo-600 p-3 rounded-xl hover:bg-white/90 transition">
          <i data-lucide="send" class="w-5 h-5"></i>
        </button>
      </div>
      <p class="text-xs text-white/50 mt-2 text-center">Awa lagi hemat tenaga ya 😅</p>
    </div>
  </div>

<script>
const API_KEY = "app-xxxxxxxxxxxxxxxxxxxx"; // GANTI INI PAKE API KEY DIFY LU
const API_URL = "https://api.dify.ai/v1/chat-messages";
const USER_ID = "user-" + Math.random().toString(36).substring(2, 9);

const chatBox = document.getElementById("chat");
const input = document.getElementById("msg");
lucide.createIcons();

input.addEventListener("keypress", e => { if(e.key === 'Enter') send(); });

function addMsg(text, sender) {
  const wrapper = document.createElement("div");
  wrapper.className = `flex ${sender === 'user'? 'justify-end' : 'justify-start'}`;

  const bubble = document.createElement("div");
  bubble.className = `max-w-[80%] p-3 rounded-2xl ${sender === 'user'? 'bg-white text-indigo-900 rounded-br-none' : 'bg-white/20 text-white rounded-bl-none backdrop-blur'}`;
  bubble.innerText = text;
  wrapper.appendChild(bubble);
  chatBox.appendChild(wrapper);
  chatBox.scrollTop = chatBox.scrollHeight;
}
