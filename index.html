<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWA AI Chat</title>
<style>
:root { --purple: #7c3aed; --pink: #a855f7; --dark: #0b0b0b; --card: #1c1c1c; }
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', system-ui, sans-serif; }
body { background: radial-gradient(1200px 600px at 80% -10%, #1a0033 0%, var(--dark) 60%); color:#fff; height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
.chat-wrapper { width:100%; max-width:600px; height:90vh; background: rgba(20,20,20,0.6); backdrop-filter: blur(20px); border:1px solid rgba(124,58,237,0.3); border-radius:24px; display:flex; flex-direction:column; overflow:hidden; box-shadow: 0 0 40px #7c3aed33; }
.header { display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.1); }
.avatar { width:44px; height:44px; border-radius:50%; border:2px solid var(--pink); box-shadow:0 0 15px var(--pink); object-fit: cover; } /* object-fit biar gak gepeng */
.header h3 { font-size:18px; } .header span { font-size:12px; color:#22c55e; }
.messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }
.bubble { padding:14px 18px; border-radius:18px; max-width:85%; line-height:1.5; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
.bot { background: var(--card); border:1px solid rgba(124,58,237,0.2); border-radius:18px 18px 18px 6px; align-self:flex-start; }
.user { background: linear-gradient(135deg, var(--purple), var(--pink)); border-radius:18px 18px 6px 18px; align-self:flex-end; }
.input-area { padding:16px 20px; border-top:1px solid rgba(255,255,255,0.1); display:flex; gap:10px; }
.input-area input { flex:1; padding:14px 18px; border-radius:24px; border:1px solid rgba(255,255,255,0.1); background: var(--card); color:#fff; outline:none; }
.input-area input:focus { border-color:var(--purple); box-shadow:0 0 10px var(--purple); }
.input-area button { padding:14px 24px; border-radius:24px; border:none; background: var(--purple); color:#fff; font-weight:600; cursor:pointer; transition:.2s; }
.input-area button:hover { background: var(--pink); transform:scale(1.05); }
</style>
</head>
<body>
<div class="chat-wrapper">
  <div class="header">
    <img class="avatar" src="./public/logo.png" alt="AWA Logo"> <!-- UDAH GUE GANTI -->
    <div>
      <h3>AWA AI</h3>
      <span>Online</span>
    </div>
  </div>
  <div class="messages">
    <div class="bubble bot">Halo! Gue AWA, AI assistant lu. Mau tanya apa hari ini?</div>
    <div class="bubble user">Ganti tampilan dong</div>
    <div class="bubble bot">Nah ini udah paling pro
