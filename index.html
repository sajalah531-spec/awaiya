<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awa - Temen Ngobrol AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-600 via-blue-600 to-indigo-700 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-lg bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl border-white/20 flex-col h-[85vh]">
    
    <!-- Header -->
    <div class="p-4 border-b border-white/20 flex items-center gap-3 shrink-0">
      <img src="https://i.pravatar.cc/100?img=47" class="w-12 h-12 rounded-full border-2 border-white/30">
      <div>
        <h1 class="font-bold text-xl text-white">Awa</h1>
        <p class="text-xs text-green-300 flex items-center gap-1"><span class="w-2 h-2 bg-green-300 rounded-full animate-pulse"></span> Online</p>
      </div>
    </div>

    <!-- Chat Area -->
    <div id="chat" class="flex-1 p-5 overflow-y-auto chat-scroll space-y-4"></div>

    <!-- Input Area -->
    <div class="p-4 border-t border-white/20 shrink-0">
      <div class="flex gap-2 items-center bg-white/20 rounded-2xl p-2">
        <input id="msg" type="text" placeholder="Mau curhat apa?" onkeydown="if(event.key==='Enter') send()"
               class="flex-1 bg-transparent text-white placeholder-white/70 focus:outline-none px-3">
        <button onclick="send()" class="bg-white text-indigo-600 p-3 rounded-xl hover:bg-white/90 active:scale-95 transition">
          <i data-lucide="send" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    const API_URL = "/api/chat";
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const USER_ID = "user-" + Math.random().toString(36).substr(2, 9);

    function addMsg(text, sender) {
      const div = document.createElement('div');
      div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `<div class="max-w-[80%] p-3 rounded-2xl shadow ${sender === 'user' ? 'bg-gradient-to-br from-indigo-400 to-purple-500 text-white rounded-br-none' : 'bg-white/90 text-gray-800 rounded-bl-none'}">${text}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const text = msgInput.value.trim();
      if (!text) return;
      addMsg(text, 'user');
      msgInput.value = '';
      
      const typing = document.createElement('div');
      typing.className = 'flex justify-start';
      typing.innerHTML = `<div class="bg-white/90 text-gray-800 p-3 rounded-2xl rounded-bl-none">...</div>`;
      chat.appendChild(typing);
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ inputs: {}, query: text, response_mode: "blocking", user: USER_ID })
        });
        const data = await res.json();
        typing.remove();
        addMsg(data.answer || "Awa lagi pusing nih 😅", 'bot');
      } catch (e) {
        typing.remove();
        addMsg("Waduh error. Cek API key udah bener?", 'bot');
      }
    }
  </script>
</body>
</html>
